name: Build & Deploy Image to Dev

on:
  push:
    branches: [main]

env:
  SERVICE_NAME: infra
  IMAGE: ghcr.io/integration-project-2026-groep-2/infra

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t ${{ env.IMAGE }}:sha-${SHORT_SHA} .
          docker tag ${{ env.IMAGE }}:sha-${SHORT_SHA} ${{ env.IMAGE }}:latest-dev

      - name: Push tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push ${{ env.IMAGE }}:sha-${SHORT_SHA}
          docker push ${{ env.IMAGE }}:latest-dev

  trigger-k8s-manifest-update:
    name: Trigger Manifest Repo Update
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Dispatch to k8s-manifests repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          repository: integration-project-2026-groep-2/k8s-manifests
          event-type: update-dev-image
          client-payload: |
            {
              "image": "${{ env.IMAGE }}",
              "tag": "${{ needs.build-and-push.outputs.image_tag }}",
              "service": "${{ github.event.repository.name }}",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }
