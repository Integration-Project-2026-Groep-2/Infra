name: Promote to Prod

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Short SHA to promote (e.g. a3f9c2b) — leave empty for latest-dev'
        required: false
      version:
        description: 'Version tag (e.g. v1.4.0) — leave empty to auto-generate release-<sha>'
        required: false
  push:
    tags:
      - 'v*'

env:
  IMAGE: ghcr.io/integration-project-2026-groep-2/infra

jobs:
  promote:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve trigger source
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION_TAG=${{ github.ref_name }}"     >> $GITHUB_ENV
            echo "SOURCE_TAG=sha-${GITHUB_SHA}"           >> $GITHUB_ENV
            echo "SHA=${GITHUB_SHA}"                      >> $GITHUB_ENV
          else
            if [ -n "${{ inputs.sha }}" ]; then
              echo "SOURCE_TAG=sha-${{ inputs.sha }}"     >> $GITHUB_ENV
              echo "SHA=${{ inputs.sha }}"                >> $GITHUB_ENV
            else
              docker pull ${{ env.IMAGE }}:latest-dev
              SHA=$(docker inspect ${{ env.IMAGE }}:latest-dev \
                --format '{{index .RepoTags 0}}' | grep -oP 'sha-\K[a-f0-9]+')
              echo "SOURCE_TAG=latest-dev"                >> $GITHUB_ENV
              echo "SHA=${SHA}"                           >> $GITHUB_ENV
            fi
            if [ -n "${{ inputs.version }}" ]; then
              VERSION=${{ inputs.version }}
              echo "VERSION_TAG=${VERSION#v}"    >> $GITHUB_ENV
            else
              echo "VERSION_TAG=release-${SHA}"           >> $GITHUB_ENV
            fi
          fi

      - name: Check source image exists
        run: |
          docker manifest inspect ${{ env.IMAGE }}:${{ env.SOURCE_TAG }} || \
            (echo "::error::Image ${{ env.SOURCE_TAG }} not found" && exit 1)

      - name: Check version not already promoted
        run: |
          if docker manifest inspect ${{ env.IMAGE }}:${{ env.VERSION_TAG }} > /dev/null 2>&1; then
            echo "::error::${{ env.VERSION_TAG }} already exists — choose a different version"
            exit 1
          fi

      - name: Retag and push
        run: |
          docker pull ${{ env.IMAGE }}:${{ env.SOURCE_TAG }}
          docker tag  ${{ env.IMAGE }}:${{ env.SOURCE_TAG }} ${{ env.IMAGE }}:${{ env.VERSION_TAG }}
          docker tag  ${{ env.IMAGE }}:${{ env.SOURCE_TAG }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ env.VERSION_TAG }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: ${{ env.SERVICE_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: ${{ env.VERSION_TAG }}
          generate_release_notes: true
