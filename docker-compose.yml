services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_management
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_ERLANG_COOKIE=securecookie
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:stable
    container_name: rabbitmq-proxy
    restart: always
    depends_on:
      - rabbitmq
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - rabbitmq_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # --- TEAM PLANNING ---
  postgres_db:
    image: postgres:17-alpine
    container_name: #naam vragen
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=planning_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rabbitmq_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d planning_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- TEAM PLANNING ---
  planning:
    image: ghcr.io/integration-project-2026-groep-2/planning:latest-dev
    container_name: planning_service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres_db:
        condition: service_healthy
    environment:
      - PORT=3000
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_NAME=planning_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    networks:
      - rabbitmq_net

volumes:
  rabbitmq_data:
  rabbitmq_logs:
  nginx_logs:
  postgres_data:


networks:
  rabbitmq_net:
