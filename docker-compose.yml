x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # --- TEAM INFRA ---
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_management
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST}
      - RABBITMQ_MANAGEMENT_PREFIX=${RABBITMQ_MANAGEMENT_PREFIX}
      - RABBITMQ_ERLANG_COOKIE=securecookie
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_net
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s # Give RabbitMQ time to boot before starting checks
    <<: *default-logging

  nginx:
    image: nginx:stable
    container_name: rabbitmq-proxy
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - frontend_drupal # Wachten op de hoofdwebsite
    ports:
      - "30098:30098"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - rabbitmq_net
    <<: *default-logging


  # --- TEAM CONTROL ROOM SETTINGS ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "${PORT_ELASTICSEARCH}:9200"
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    networks:
      - controlroom-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    <<: *default-logging

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${PORT_KIBANA}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - controlroom-network
    <<: *default-logging

  controlroom:
    image: ghcr.io/integration-project-2026-groep-2/controlroom:latest-dev
    container_name: controlroom
    depends_on:
      - elasticsearch
      - rabbitmq
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    networks:
      - controlroom-network
      - rabbitmq_net # Toegevoegd zodat deze container RabbitMQ kan vinden op hostname 'rabbitmq'
    restart: unless-stopped
    
    
  # --- TEAM FACTURATIE ---
  billing_app:
    image: ghcr.io/integration-project-2026-groep-2/facturatie:latest-dev
    container_name: billing_app
    env_file: ./billing/.env

    environment:
      - DB_HOST=billing_db
      - RABBITMQ_HOST=rabbitmq # Verwijst naar de Infra RabbitMQ
      - RABBITMQ_USER=${RABBITMQ_USER} # Zorg dat hun code deze variabelen uit jullie .env gebruikt:
      - RABBITMQ_PASS=${RABBITMQ_PASS}
    networks:
      - rabbitmq_net
      - billing_net
    <<: *default-logging

  billing_db:
    image: mariadb:11.8
    container_name: billing_db
    env_file: ./billing/.env
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: ${BILLING_DB_NAME}
      MARIADB_ROOT_PASSWORD: ${BILLING_DB_ROOT_PASS}
      MARIADB_USER: ${BILLING_DB_USER}
      MARIADB_PASSWORD: ${BILLING_DB_PASS}
    volumes:
      - billing_db_data:/var/lib/mysql
    networks:
      - billing_net
    <<: *default-logging


  # --- TEAM MAILING ---
  mailing_app:
    image: ghcr.io/integration-project-2026-groep-2/mailing:latest-dev
    container_name: mailing_app
    env_file: ./mailing/.env
    ports:
      - "${MAILING_APP_PORT:-3000}:3000"
    depends_on:
      mailing_db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      - DB_HOST=mailing_db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    networks:
      - rabbitmq_net
      - mailing_net
    restart: unless-stopped
    <<: *default-logging

  mailing_db:
    image: mariadb:11.8
    container_name: mailing_db
    env_file: ./mailing/.env
    environment:
      MARIADB_ROOT_PASSWORD: ${MAILING_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MAILING_DB_NAME}
      MARIADB_USER: ${MAILING_DB_USER}
      MARIADB_PASSWORD: ${MAILING_DB_PASS}
    ports:
      - "${MAILING_DB_EXPOSE_PORT:-3308}:3306"
    volumes:
      - mailing_db_data:/var/lib/mysql
      - ./mailing/docker/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - mailing_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped
    <<: *default-logging


  # --- TEAM KASSA  ---
  # database (kassa)
  kassa_db:
    image: postgres:18-alpine
    container_name: kassa_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${KASSA_DB_USER}
      - POSTGRES_PASSWORD=${KASSA_DB_PASSWORD}
    volumes:
      - postgres_data_kassa:/var/lib/postgresql/data
    networks:
      - rabbitmq_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANNING_DB_USER} -d planning_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *default-logging

  odoo:
    image: odoo:18.0
    container_name: kassa_odoo
    restart: unless-stopped
    depends_on:
      kassa_db:
        condition: service_healthy
    environment:
      HOST: kassa_db
      USER: ${KASSA_DB_USER}
      PASSWORD: ${KASSA_DB_PASSWORD}
    ports:
      - "8069:8069"
    volumes:
      - odoo_web_data_kassa:/var/lib/odoo
      # Optional if you want to mount local custom Odoo modules:
      # - ./odoo/addons:/mnt/extra-addons
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8069').read()\""]
      interval: 20s
      timeout: 10s
      retries: 10

  # --- TEAM KASSA  ---
  kassa:
    image: ghcr.io/integration-project-2026-groep-2/kassa:latest-dev
    container_name: kassa_service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      - ODOO_URL=${ODOO_URL}
      - ODOO_DATABASE=${ODOO_DB}
      - ODOO_USERNAME=${ODOO_USERNAME}
      - ODOO_PASSWORD=${ODOO_PASSWORD}
      - SYSTEM_NAME=Kassa
      - HEARTBEAT_INTERVAL=1
      - STATUS_CHECK_INTERVAL=30
      - LOG_LEVEL=INFO
    networks:
      - rabbitmq_net


# --- TEAM CRM  ---
  crm:
    image: ghcr.io/integration-project-2026-groep-2/crm:latest-dev
    container_name: crm
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      - SALESFORCE_USERNAME=${SF_USER}
      - SALESFORCE_PASSWORD=${SF_PASS}
      - SALESFORCE_SECURITY_TOKEN=${SF_TOKEN}
      - SALESFORCE_DOMAIN=login
      - LOG_LEVEL=INFO
    networks:
      - rabbitmq_net
    <<: *default-logging
    
 
# --- TEAM FRONTEND ---
  frontend_drupal:
    image: drupal:11-apache
    container_name: frontend_drupal
    restart: unless-stopped
    depends_on:
      frontend_db:
        condition: service_healthy
    environment:
      - DRUPAL_DB_HOST=frontend_db
      - DRUPAL_DB_NAME=${FRONTEND_DB_NAME}
      - DRUPAL_DB_USER=${FRONTEND_DB_USER}
      - DRUPAL_DB_PASS=${FRONTEND_DB_PASS}
    volumes:
      - drupal_modules:/var/www/html/modules
      - drupal_profiles:/var/www/html/profiles
      - drupal_themes:/var/www/html/themes
      - drupal_sites:/var/www/html/sites

  frontend_db:
    image: mariadb:12
    container_name: frontend_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${FRONTEND_DB_NAME}
      MARIADB_USER: ${FRONTEND_DB_USER}
      MARIADB_PASSWORD: ${FRONTEND_DB_PASS}
      MARIADB_ROOT_PASSWORD: ${FRONTEND_DB_ROOT_PASS}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - frontend_db_data:/var/lib/mysql
    networks:
      - rabbitmq_net
    <<: *default-logging


  # --- TEAM PLANNING ---
  planning_db:
    image: postgres:17-alpine
    container_name: infra_postgres_planning
    restart: unless-stopped
    env_file: ./planning/.env
    environment:
      - POSTGRES_USER=${PLANNING_DB_USER}
      - POSTGRES_PASSWORD=${PLANNING_DB_PASSWORD}
      - POSTGRES_DB=planning_db
    volumes:
      - postgres_data_planning:/var/lib/postgresql/data
    networks:
      - rabbitmq_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANNING_DB_USER} -d planning_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- TEAM PLANNING ---
  planning:
    image: ghcr.io/integration-project-2026-groep-2/planning:latest-dev
    container_name: planning_service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      planning_db:
        condition: service_healthy
    env_file: ./planning/.env
    environment:
      - PORT=3000
      - DB_HOST=${PLANNING_DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${PLANNING_DB_NAME}
      - DB_USER=${PLANNING_DB_USER}
      - DB_PASSWORD=${PLANNING_DB_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    networks:
      - rabbitmq_net

# --- VOLUMES & NETWORKS ---
volumes:
  rabbitmq_data:
  rabbitmq_logs:
  nginx_logs:
  # Controlroom
  elasticsearch:
  billing_db_data: # Volume voor de facturatie database
  mailing_db_data: # volume toegevoegd voor Mailing data
  postgres_data_planning:
  # Kassa
  postgres_data_kassa:
  odoo_web_data_kassa:
  # Frontend
  drupal_modules:
  drupal_profiles:
  drupal_themes:
  drupal_sites:
  frontend_db_data:

networks:
  rabbitmq_net:
    driver: bridge
  controlroom-network:
    driver: bridge
  billing_net:
    driver: bridge
  mailing_net:
    driver: bridge
