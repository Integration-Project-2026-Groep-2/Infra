x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_management
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_ERLANG_COOKIE=securecookie
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_net
    <<: *default-logging

  nginx:
    image: nginx:stable
    container_name: rabbitmq-proxy
    restart: always
    depends_on:
      - rabbitmq
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - rabbitmq_net
    <<: *default-logging

# --- TEAM CRM  ---
  crm:
    image: ghcr.io/integration-project-2026-groep-2/crm:latest-dev
    container_name: crm
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      - SALESFORCE_USERNAME=${SF_USER}
      - SALESFORCE_PASSWORD=${SF_PASS}
      - SALESFORCE_SECURITY_TOKEN=${SF_TOKEN}
      - SALESFORCE_DOMAIN=login
      - LOG_LEVEL=INFO
    networks:
      - rabbitmq_net
    <<: *default-logging


volumes:
  rabbitmq_data:
  rabbitmq_logs:
  nginx_logs:

networks:
  rabbitmq_net: