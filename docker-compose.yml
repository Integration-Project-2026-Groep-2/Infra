x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # --- TEAM INFRA ---
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_management
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST}
      - RABBITMQ_MANAGEMENT_PREFIX=${RABBITMQ_MANAGEMENT_PREFIX}
      - RABBITMQ_ERLANG_COOKIE=securecookie
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_net
      - mcp-rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s # Give RabbitMQ time to boot before starting checks
    <<: *default-logging

  nginx:
    image: nginx:stable
    container_name: rabbitmq-proxy
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - frontend_drupal # Wachten op de hoofdwebsite
      - kibana
    ports:
      - "30098:30098"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro 
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - rabbitmq_net
      - nginx
      - mcp-nginx
    command: |
      /bin/sh -c "
      echo \"${CONTROL_ROOM_USER}:$(openssl passwd -apr1 ${CONTROL_ROOM_PASS})\" > /etc/nginx/.htpasswd-control-room
      echo \"${FACTURATIE_USER}:$(openssl passwd -apr1 ${FACTURATIE_PASS})\" > /etc/nginx/.htpasswd-facturatie
      echo \"${KASSA_USER}:$(openssl passwd -apr1 ${KASSA_PASS})\" > /etc/nginx/.htpasswd-kassa
      echo \"${MAILING_USER}:$(openssl passwd -apr1 ${MAILING_PASS})\" > /etc/nginx/.htpasswd-mailing
      nginx -g 'daemon off;'
      "
    <<: *default-logging


  # --- TEAM CONTROL ROOM SETTINGS ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "${PORT_ELASTICSEARCH}:9200"
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    networks:
      - controlroom-network
      - mcp-controlroom
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    <<: *default-logging

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=${KIBANA_USERNAME}
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - SERVER_PUBLICBASEURL=${KIBANA_PUBLIC_URL}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_SECURITY_AUDIT_ENABLED=true
      - XPACK_SECURITY_AUDIT_OUTPUTS=["file", "elasticsearch"]
    ports:
      - "${PORT_KIBANA}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - controlroom-network
      - nginx
      - mcp-controlroom
    <<: *default-logging

  controlroom:
    image: ghcr.io/integration-project-2026-groep-2/controlroom:latest-dev
    container_name: controlroom
    depends_on:
      - elasticsearch
      - rabbitmq
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      - RABBITMQ_HOST=rabbitmq
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CONTROLROOM_ES_USER=${CONTROLROOM_ES_USER}
      - CONTROLROOM_ES_PASS=${CONTROLROOM_ES_PASS}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}
      - MONITORED_SERVICES=${MONITORED_SERVICES}
    networks:
      - controlroom-network
      - rabbitmq_net # Toegevoegd zodat deze container RabbitMQ kan vinden op hostname 'rabbitmq'
      - mcp-controlroom
    restart: unless-stopped
    
    
  # --- TEAM FACTURATIE ---
  billing_app:
    image: ghcr.io/integration-project-2026-groep-2/facturatie:latest-dev
    container_name: billing_app
    env_file: ./billing/.env

    environment:
      - DB_HOST=billing_db
      - RABBITMQ_HOST=rabbitmq # Verwijst naar de Infra RabbitMQ
      - RABBITMQ_USER=${RABBITMQ_USER} # Zorg dat hun code deze variabelen uit jullie .env gebruikt:
      - RABBITMQ_PASS=${RABBITMQ_PASS}
    networks:
      - rabbitmq_net
      - billing_net
      - nginx
      - mcp-facturatie
    <<: *default-logging

  billing_db:
    image: mariadb:11.8
    container_name: billing_db
    env_file: ./billing/.env
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: ${BILLING_DB_NAME}
      MARIADB_ROOT_PASSWORD: ${BILLING_DB_ROOT_PASS}
      MARIADB_USER: ${BILLING_DB_USER}
      MARIADB_PASSWORD: ${BILLING_DB_PASS}
    volumes:
      - billing_db_data:/var/lib/mysql
    networks:
      - billing_net
    <<: *default-logging


  # --- TEAM MAILING ---
  mailing_app:
    image: ghcr.io/integration-project-2026-groep-2/mailing:latest-dev
    container_name: mailing_app
    env_file: ./mailing/.env
    ports:
      - "${MAILING_APP_PORT:-3000}:3000"
    depends_on:
      mailing_db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      - DB_HOST=mailing_db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    networks:
      - rabbitmq_net
      - mailing_net
      - nginx
      - mcp-mailing
    restart: unless-stopped
    <<: *default-logging

  mailing_db:
    image: mariadb:11.8
    container_name: mailing_db
    env_file: ./mailing/.env
    environment:
      MARIADB_ROOT_PASSWORD: ${MAILING_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MAILING_DB_NAME}
      MARIADB_USER: ${MAILING_DB_USER}
      MARIADB_PASSWORD: ${MAILING_DB_PASS}
    ports:
      - "${MAILING_DB_EXPOSE_PORT:-3308}:3306"
    volumes:
      - mailing_db_data:/var/lib/mysql
      - ./mailing/docker/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - mailing_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped
    <<: *default-logging


  # --- TEAM KASSA  ---
  # database (kassa)
  kassa_db:
    image: postgres:18-alpine
    container_name: kassa_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${KASSA_DB_USER}
      - POSTGRES_PASSWORD=${KASSA_DB_PASSWORD}
      - POSTGRES_DB=kassa_db
    volumes:
      - postgres_data_kassa:/var/lib/postgresql/data
    networks:
      - kassa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KASSA_DB_USER} -d kassa_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *default-logging

  #odoo:
    #image: odoo:18.0
    #container_name: kassa_odoo
    #restart: unless-stopped
    #depends_on:
      #kassa_db:
        #condition: service_healthy
    #environment:
      #HOST: kassa_db
      #USER: ${KASSA_DB_USER}
      #PASSWORD: ${KASSA_DB_PASSWORD}
    #ports:
      #- "8069:8069"
    #volumes:
      #- odoo_web_data_kassa:/var/lib/odoo
      ## Optional if you want to mount local custom Odoo modules:
      ## - ./odoo/addons:/mnt/extra-addons
    #networks:
      #- kassa-network
    #healthcheck:
      #test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8069').read()\""]
      #interval: 20s
      #timeout: 10s
      #retries: 10

  # --- TEAM KASSA  ---
  kassa:
    image: ghcr.io/integration-project-2026-groep-2/kassa:latest-dev
    container_name: kassa_service
    restart: unless-stopped
    depends_on:
      kassa_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - SYSTEM_NAME=Kassa
      - ODOO_PORT=8069
      - ODOO_URL=${ODOO_URL}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USER=${ODOO_USERNAME}
      - ODOO_PASSWORD=${ODOO_PASSWORD}
      # DB env
      - HOST=kassa_db
      - USER=${KASSA_DB_USER}
      - PASSWORD=${KASSA_DB_PASSWORD}
      - DB_HOST=kassa_db
      - DB_PORT=5432
      - POSTGRES_DB=kassa_db
      - POSTGRES_USER=${KASSA_DB_USER}
      - POSTGRES_PASSWORD=${KASSA_DB_PASSWORD}
      # RabbitMQ
      - RABBIT_HOST=rabbitmq
      - RABBIT_PORT=5672
      - RABBIT_USER=${RABBITMQ_USER}
      - RABBIT_PASSWORD=${RABBITMQ_PASS}
      - RABBIT_VHOST=${RABBITMQ_VHOST}
      - HEARTBEAT_INTERVAL_SECONDS=1
      - HEARTBEAT_EXCHANGE=heartbeat.direct
      - HEARTBEAT_ROUTING_KEY=routing.heartbeat
      - STATUS_CHECK_INTERVAL=30
      - LOG_LEVEL=INFO
      # User CRUD
      - USER_EVENTS_EXCHANGE=user.topic
      - USER_EVENTS_EXCHANGE_TYPE=topic
      - USER_EVENTS_RETRY_TTL_MS=15000
    volumes:
      - odoo_web_data_kassa:/var/lib/odoo
    networks:
      - nginx 
      - rabbitmq_net
      - kassa-network
      - mcp-kassa
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8069').read()\""]
      interval: 20s
      timeout: 10s
      retries: 10
    <<: *default-logging


# --- TEAM CRM  ---
  crm:
    image: ghcr.io/integration-project-2026-groep-2/crm:latest-dev
    container_name: crm
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      - SALESFORCE_USERNAME=${SF_USER}
      - SALESFORCE_PASSWORD=${SF_PASS}
      - SALESFORCE_SECURITY_TOKEN=${SF_TOKEN}
      - SALESFORCE_DOMAIN=login
      - LOG_LEVEL=INFO
      - CRM_MCP_HOST=0.0.0.0
      - CRM_MCP_PORT=7001
      - CRM_MCP_TRANSPORT=streamable-http
    networks:
      - rabbitmq_net
      - mcp-crm
    <<: *default-logging
    
 
# --- TEAM FRONTEND ---
  frontend_drupal:
    image: ghcr.io/integration-project-2026-groep-2/frontend:latest-dev
    container_name: frontend_drupal
    restart: unless-stopped
    depends_on:
      frontend_db:
        condition: service_healthy
    environment:
      - DRUPAL_DB_HOST=frontend_db
      - DRUPAL_DB_NAME=${FRONTEND_DB_NAME}
      - DRUPAL_DB_USER=${FRONTEND_DB_USER}
      - DRUPAL_DB_PASS=${FRONTEND_DB_PASS}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
    volumes:
      - drupal_profiles:/var/www/html/profiles
      - drupal_themes:/var/www/html/themes
      - drupal_sites:/var/www/html/sites
    networks:
      - nginx
      - rabbitmq_net
      - frontend-network
      - mcp-frontend

  frontend_db:
    image: mariadb:12
    container_name: frontend_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${FRONTEND_DB_NAME}
      MARIADB_USER: ${FRONTEND_DB_USER}
      MARIADB_PASSWORD: ${FRONTEND_DB_PASS}
      MARIADB_ROOT_PASSWORD: ${FRONTEND_DB_ROOT_PASS}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - frontend_db_data:/var/lib/mysql
    networks:
      - rabbitmq_net
      - frontend-network
    <<: *default-logging
    

  # --- TEAM PLANNING ---
  planning_db:
    image: postgres:17-alpine
    container_name: infra_postgres_planning
    restart: unless-stopped
    env_file: ./planning/.env
    environment:
      - POSTGRES_USER=${PLANNING_DB_USER}
      - POSTGRES_PASSWORD=${PLANNING_DB_PASSWORD}
      - POSTGRES_DB=planning_db
    volumes:
      - postgres_data_planning:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANNING_DB_USER} -d planning_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- TEAM PLANNING ---
  planning:
    image: ghcr.io/integration-project-2026-groep-2/planning:latest-dev
    container_name: planning_service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      planning_db:
        condition: service_healthy
    env_file: ./planning/.env
    environment:
      - PORT=3000
      - DB_HOST=${PLANNING_DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${PLANNING_DB_NAME}
      - DB_USER=${PLANNING_DB_USER}
      - DB_PASSWORD=${PLANNING_DB_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    networks:
      - rabbitmq_net
      - mcp-planning
  

  # --- TEAM MCP ---
  mcp-master:
    image: ghcr.io/integration-project-2026-groep-2/mcp-master:latest-dev
    container_name: mcp-master
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      crm:
        condition: service_healthy
      controlroom:
        condition: service_started
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      - RABBITMQ_EXCHANGE=ai.events
      - MCP_SERVERS=crm@http://crm:7001/mcp,controlroom@http://controlroom:5555/mcp
      - CHAT_ALLOWED_ORIGINS=https://www.integration-project-2026-groep-2.my.be
      - RUST_LOG=info,mcp_master=info
    networks:
      - mcp-rabbitmq
      - mcp-nginx
      - mcp-controlroom
      - mcp-crm
      - mcp-facturatie
      - mcp-frontend
      - mcp-kassa
      - mcp-mailing
      - mcp-planning
    <<: *default-logging

# --- VOLUMES & NETWORKS ---
volumes:
  rabbitmq_data:
  rabbitmq_logs:
  nginx_logs:
  # Controlroom
  elasticsearch:
  billing_db_data: # Volume voor de facturatie database
  mailing_db_data: # volume toegevoegd voor Mailing data
  postgres_data_planning:
  # Kassa
  postgres_data_kassa:
  odoo_web_data_kassa:
  # Frontend
  drupal_modules:
  drupal_profiles:
  drupal_themes:
  drupal_sites:
  frontend_db_data:

networks:
  rabbitmq_net:
    driver: bridge
  nginx:
    driver: bridge
  controlroom-network:
    driver: bridge
  kassa-network:
    driver: bridge
  frontend-network:
    driver: bridge
  billing_net:
    driver: bridge
  mailing_net:
    driver: bridge
  
  mcp-rabbitmq:
  mcp-nginx:
  mcp-controlroom:
  mcp-crm:
  mcp-facturatie:
  mcp-frontend:
  mcp-kassa:
  mcp-mailing:
  mcp-planning: