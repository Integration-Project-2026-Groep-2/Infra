x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # --- TEAM INFRA ---
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_management
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_ERLANG_COOKIE=securecookie
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_net
    <<: *default-logging

  nginx:
    image: nginx:stable
    container_name: rabbitmq-proxy
    restart: always
    depends_on:
      - rabbitmq
      - frontend_drupal # Wachten op de hoofdwebsite
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - rabbitmq_net
    <<: *default-logging

  # --- TEAM FRONTEND ---
  frontend_drupal:
    image: drupal:10-apache
    container_name: frontend_drupal
    restart: always
    environment:
      - DRUPAL_DB_HOST=frontend_db
      - DRUPAL_DB_NAME=${FRONTEND_DB_NAME}
      - DRUPAL_DB_USER=${FRONTEND_DB_USER}
      - DRUPAL_DB_PASS=${FRONTEND_DB_PASS}
    volumes:
      - drupal_modules:/var/www/html/modules
      - drupal_profiles:/var/www/html/profiles
      - drupal_themes:/var/www/html/themes
      - drupal_sites:/var/www/html/sites
    networks:
      - rabbitmq_net
    <<: *default-logging

  frontend_db:
    image: postgres:16
    container_name: frontend_db
    restart: always
    environment:
      POSTGRES_DB: ${FRONTEND_DB_NAME}
      POSTGRES_USER: ${FRONTEND_DB_USER}
      POSTGRES_PASSWORD: ${FRONTEND_DB_PASS}
    volumes:
      - frontend_db_data:/var/lib/postgresql/data
    networks:
      - rabbitmq_net
    <<: *default-logging

# --- VOLUMES & NETWORKS ---
volumes:
  rabbitmq_data:
  rabbitmq_logs:
  nginx_logs:
  # Nieuwe volumes voor Frontend
  drupal_modules:
  drupal_profiles:
  drupal_themes:
  drupal_sites:
  frontend_db_data:

networks:
  rabbitmq_net:
    driver: bridge