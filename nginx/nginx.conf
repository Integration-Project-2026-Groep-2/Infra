events {}

http {
    upstream rabbitmq_management {
        server rabbitmq:15672;
    }

    # HTTP naar HTTPS Redirect
    server {
        listen 80;
        server_name integrationproject-2526s2-dag02.westeurope.cloudapp.azure.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name integrationproject-2526s2-dag02.westeurope.cloudapp.azure.com;

        # Paden binnen de container (zoals gemapt in docker-compose)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Management interface op specifiek pad voor Team Infra
        location /rabbitmq-management/ {
            proxy_pass http://rabbitmq_management/; 
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Belangrijk voor RabbitMQ Management UI (Websockets/stomp)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}