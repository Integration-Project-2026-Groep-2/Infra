events {}

http {
    server_names_hash_bucket_size 128;
    
    # --- UPSTREAMS (Interne verbindingen) ---
    
    # Team Infra
    upstream rabbitmq_management {
        server rabbitmq:15672;
    }

    # Team Control Room (Kibana)
    upstream control_room_ui {
        server kibana:5601;
    }

    # Team Facturatie
    upstream billing_ui {
        server billing_app:80;
    }

    # Team Mailing
    upstream mailing_ui {
        server mailing_app:3000;
    }

    # Team Kassa (Odoo) - placeholder op basis van opdracht
    #upstream kassa_ui {
    #    server kassa_app:8069;
    #}

    # Team Frontend (Drupal) - placeholder op basis van opdracht
    upstream frontend_ui {
        server frontend_drupal:80;
    }

    # Control Room
    server {
        listen 30098 ssl;
        server_name control-room.integration-project-2026-groep-2.my.be;

        # SSL Certificaten
        ssl_certificate /etc/nginx/certs/integration-project-2026-groep-2.my.be.pem;
        ssl_certificate_key /etc/nginx/certs/integration-project-2026-groep-2.my.be.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Standaard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # Fix wrong port redirection

        location / {
            auth_basic "Control Room Area";
            auth_basic_user_file /etc/nginx/.htpasswd-control-room;
            proxy_pass http://control_room_ui/;
            # Nodig voor Kibana subpad routing
            proxy_set_header x-found-cluster http://elasticsearch:9200;
        }
    }

    # Kassa
    server {
        listen 30098 ssl;
        server_name kassa.integration-project-2026-groep-2.my.be;

        # SSL Certificaten
        ssl_certificate /etc/nginx/certs/integration-project-2026-groep-2.my.be.pem;
        ssl_certificate_key /etc/nginx/certs/integration-project-2026-groep-2.my.be.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Standaard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # Fix wrong port redirection

        location / {
            auth_basic "Kassa Area";
            auth_basic_user_file /etc/nginx/.htpasswd-kassa;
            #proxy_pass http://kassa_ui/;
        }
    }

    # Facturatie
    server {
        listen 30098 ssl;
        server_name facturatie.integration-project-2026-groep-2.my.be;

        # SSL Certificaten
        ssl_certificate /etc/nginx/certs/integration-project-2026-groep-2.my.be.pem;
        ssl_certificate_key /etc/nginx/certs/integration-project-2026-groep-2.my.be.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Standaard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # Fix wrong port redirection

        location / {
            auth_basic "Facturatie Area";
            auth_basic_user_file /etc/nginx/.htpasswd-facturatie;
            proxy_pass http://billing_ui/;
        }
    }

    #
    server {
        listen 30098 ssl;
        server_name mailing.integration-project-2026-groep-2.my.be;

        # SSL Certificaten
        ssl_certificate /etc/nginx/certs/integration-project-2026-groep-2.my.be.pem;
        ssl_certificate_key /etc/nginx/certs/integration-project-2026-groep-2.my.be.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Standaard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # Fix wrong port redirection

        location / {
            auth_basic "Mailing Area";
            auth_basic_user_file /etc/nginx/.htpasswd-mailing;
            proxy_pass http://mailing_ui/;
        }
    }

    # RabbitMQ
    server {
        listen 30098 ssl;
        server_name rabbitmq.integration-project-2026-groep-2.my.be;

        # SSL Certificaten
        ssl_certificate /etc/nginx/certs/integration-project-2026-groep-2.my.be.pem;
        ssl_certificate_key /etc/nginx/certs/integration-project-2026-groep-2.my.be.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Standaard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # Fix wrong port redirection

        location / {
            proxy_pass http://rabbitmq_management;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Root Domain
    server {
        listen 30098 ssl;
        server_name integration-project-2026-groep-2.my.be www.integration-project-2026-groep-2.my.be;

        # SSL Certificaten
        ssl_certificate /etc/nginx/certs/integration-project-2026-groep-2.my.be.pem;
        ssl_certificate_key /etc/nginx/certs/integration-project-2026-groep-2.my.be.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Standaard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # Fix wrong port redirection from Drupal's Apache

        # --- LOCATIONS ---
        # Team Frontend: Drupal (Catch-all root)
        location / {
            proxy_pass http://frontend_ui/;
        }
    }
}
