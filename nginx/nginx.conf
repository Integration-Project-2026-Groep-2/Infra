events {}

http {
    # --- UPSTREAMS (Interne verbindingen) ---
    
    # Team Infra
    upstream rabbitmq_management {
        server rabbitmq:15672;
    }

    # Team Control Room (Kibana)
    upstream control_room_ui {
        server kibana:5601;
    }

    # Team Facturatie
    upstream billing_ui {
        server billing_app:80;
    }

    # Team Mailing
    upstream mailing_ui {
        server mailing_app:3000;
    }

    # Team Kassa (Odoo) - placeholder op basis van opdracht
    upstream kassa_ui {
        server kassa_app:8069;
    }

    # Team Frontend (Drupal) - placeholder op basis van opdracht
    upstream frontend_ui {
        server frontend_drupal:80;
    }

    # HTTP naar HTTPS Redirect
    server {
        listen 80;
        server_name integrationproject-2526s2-dag02.westeurope.cloudapp.azure.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 30098 ssl;
        server_name integration-project-2026-groep-2.my.be;

        # SSL Certificaten
        ssl_certificate /etc/nginx/certs/integration-project-2026-groep-2.my.be.pem;
        ssl_certificate_key /etc/nginx/certs/integration-project-2026-groep-2.my.be.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Beveiligingsheaders
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Standaard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # Fix wrong port redirection from Drupal's Apache

        # --- LOCATIONS ---

        # 1. Team Infra: Management interface
        location /rabbitmq-management/ {
            proxy_pass http://rabbitmq_management;
            rewrite ^/rabbitmq-management/(.*)$ /$1 break;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. Team Control Room: Kibana Dashboard
        location /control-room/ {
            proxy_pass http://control_room_ui/;
            # Nodig voor Kibana subpad routing
            proxy_set_header x-found-cluster http://elasticsearch:9200;
        }

        # 3. Team Facturatie: FOSSbilling
        location /facturatie/ {
            proxy_pass http://billing_ui/;
        }

        # 4. Team Mailing: App interface
        location /mailing/ {
            proxy_pass http://mailing_ui/;
        }

        # 5. Team Kassa: Odoo POS
        location /kassa/ {
            proxy_pass http://kassa_ui/;
        }

        # 6. Team Frontend: Drupal (Catch-all root)
        location / {
            proxy_pass http://frontend_ui/;
        }
    }
}
