upstream frontend-ui {
    server frontend:80;
}

server {
    listen 30098 ssl;
    server_name integration-project-2026-groep-2.my.be www.integration-project-2026-groep-2.my.be;

    include snippets/ssl-params.conf;
    include snippets/proxy-headers.conf;

    location / {
        proxy_pass http://frontend-ui/;
    }
}