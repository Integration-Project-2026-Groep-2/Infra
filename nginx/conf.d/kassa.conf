upstream kassa-ui {
    server kassa:8069;
}

server {
    listen 30098 ssl;
    server_name kassa.integration-project-2026-groep-2.my.be;

    include snippets/ssl-params.conf;
    include snippets/proxy-headers.conf;

    location / {
        auth_basic "Kassa Area";
        auth_basic_user_file /etc/nginx/.htpasswd-kassa;
        proxy_pass http://kassa-ui/;
    }
}